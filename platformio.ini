[platformio]
src_dir = src
default_envs = esp32-base
extra_configs = platformio_override.ini

[env:esp32-base]
platform  = espressif32@6.12.0
framework = arduino
board     = esp32dev
platform_packages =
;  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
   framework-arduinoespressif32@https://github.com/ricardoquesada/esp32-arduino-lib-builder/releases/download/4.1.0/esp32-bluepad32-4.1.0.zip
extra_scripts = pre:build_flags.py
board_build.filesystem = littlefs
upload_speed = 1500000
monitor_speed = 115200
board_build.f_cpu = 240000000L
monitor_filters = time, esp32_exception_decoder, send_on_enter
lib_deps =
  https://github.com/WorksOnMyCloud/WebOTA.git#v1.0.0
  ESP32Async/AsyncTCP@3.4.10
  ESP32Async/ESPAsyncWebServer@3.10.3

build_flags   =
  -O3
  -DESP32=1

build_unflags = -Os -Wall


[env:d1mini32]
extends = env:esp32-base
monitor_speed   = 115200
monitor_filters = time, esp32_exception_decoder, send_on_enter
upload_speed           = 921600
board_build.f_cpu      = 240000000L
build_flags =
  ${env:esp32-base.build_flags}
  ${override.build_flags}


build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/>
